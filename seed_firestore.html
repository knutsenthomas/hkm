<!DOCTYPE html>
<html lang="no">

<head>
            <!-- Theme Initializer -->
    <script>
        (function () {
            const savedTheme = localStorage.getItem('hkm_theme');
            if (savedTheme) {
                document.documentElement.setAttribute('data-theme', savedTheme);
            } else {
                const hour = new Date().getHours();
                const isNight = hour >= 22 || hour < 6;
                const systemTheme = isNight || window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
                document.documentElement.setAttribute('data-theme', systemTheme);
            }
        })();
    </script>
    <meta charset="UTF-8">
    <title>Firestore Seed Utility - HKM</title>

            font-family: sans-serif;

        .card {

    <!-- Loader Safety Net -->
    <script>
        (function() {
            // Safety net: Remove loading screen if CMS fails to initialize within 4 seconds
            setTimeout(function() {
                if (document.body && document.body.classList.contains('cms-loading')) {
                    console.warn('CMS loading timeout - forcing visibility');
                    document.body.classList.remove('cms-loading');
                    var loader = document.getElementById('loader-wrapper');
                    if (loader) loader.style.display = 'none';
                }
            }, 4000);
        })();

                    await firebaseService.db.collection('content').doc('collection_events').set({
                        items: []

                    log('✅ collection_events (tom) opprettet!', 'success');
                } else {
                    log('ℹ️ collection_events eksisterer allerede.', 'success');
                }

                        items: []

                    log('✅ collection_causes (tom) opprettet!', 'success');

                // 5. email_templates (daily_bible_reading)
